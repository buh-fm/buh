# Scoped sudo for the gitea_ci deploy user on the buh node host (slartibartfast).
# Installed by script/infra-setup.sh as /etc/sudoers.d/buh_node_gitea_ci and
# verified with `visudo -cf`. Every rule is pinned to one literal destination; the
# `*` in an rsync rule matches rsync's --server argument vector, the trailing path
# is what actually bounds it. `=` is escaped (sudoers reserves it).
#
# buh ships no certificate material (the node is its own CA), so there is no
# setfacl-on-host-cert rule and no cert.path unit — unlike the postgres-mTLS apps.

# --- file pushes (rsync --rsync-path='sudo rsync') ---
gitea_ci ALL=(root) NOPASSWD: /usr/bin/rsync * /etc/sysusers.d/buh.conf
gitea_ci ALL=(root) NOPASSWD: /usr/bin/rsync * /usr/local/bin/buh-api
gitea_ci ALL=(root) NOPASSWD: /usr/bin/rsync * /usr/local/bin/buh-cli
gitea_ci ALL=(root) NOPASSWD: /usr/bin/rsync * /etc/buh/config.toml
gitea_ci ALL=(root) NOPASSWD: /usr/bin/rsync * /etc/systemd/system/buh-node.service
gitea_ci ALL=(root) NOPASSWD: /usr/bin/rsync * /etc/firewalld/services/buh-node.xml

# --- service account + directories ---
gitea_ci ALL=(root) NOPASSWD: /usr/bin/systemd-sysusers
gitea_ci ALL=(root) NOPASSWD: /usr/bin/install -d -o root -g buh -m 0750 /etc/buh
gitea_ci ALL=(root) NOPASSWD: /usr/bin/install -d -o buh -g buh -m 0750 /var/lib/buh

# --- SELinux contexts + firewalld ---
# No `semanage port` rules: buh-api runs as unconfined_service_t and may bind any
# port, so BUH_NODE_PORT needs no http_port_t label. The firewalld rules below are
# keyed on the service NAME (buh-node), not the port number, so changing
# BUH_NODE_PORT is purely repo-side and needs no edit here / no infra-setup re-run.
gitea_ci ALL=(root) NOPASSWD: /usr/sbin/restorecon -R /usr/local/bin/buh-api /usr/local/bin/buh-cli /etc/buh /var/lib/buh
gitea_ci ALL=(root) NOPASSWD: /usr/bin/firewall-cmd --reload
gitea_ci ALL=(root) NOPASSWD: /usr/bin/firewall-cmd --query-service\=buh-node
gitea_ci ALL=(root) NOPASSWD: /usr/bin/firewall-cmd --add-service\=buh-node --permanent
gitea_ci ALL=(root) NOPASSWD: /usr/bin/firewall-cmd --add-service\=buh-node

# --- service lifecycle ---
gitea_ci ALL=(root) NOPASSWD: /usr/bin/systemctl daemon-reload
gitea_ci ALL=(root) NOPASSWD: /usr/bin/systemctl enable buh-node.service
gitea_ci ALL=(root) NOPASSWD: /usr/bin/systemctl restart buh-node.service
